<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Het Hingrajiya | Android Developer Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;';
        div.innerHTML = 'Live Debug Window - Error Detected:<br>' + msg + '<br>at ' + url + ':' + line + ':' + col;
        document.body.appendChild(div);
        return false;
      };
      window.onunhandledrejection = function(event) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:50%;left:0;width:100%;background:orange;color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;';
        div.innerHTML = 'Live Debug Window - Promise Rejection:<br>' + event.reason;
        document.body.appendChild(div);
      };
    </script>
  </head>
  <body class="bg-[#fafafa] dark:bg-slate-950 text-slate-900 dark:text-slate-100 selection:bg-blue-100 dark:selection:bg-blue-900 overflow-x-hidden transition-colors duration-500">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@latest/build/spline-viewer.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  </body>
</html>
